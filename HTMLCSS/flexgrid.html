 display: flex;

 .slide{
    display: grid;
    grid-template-columns:repeat(4,1fr);
 }
div div{
    padding: 150px;

    margin: 10px;
}

@media (max-width:320px) {
    .slide{
        display: grid;
        grid-template-columns:repeat(1,1fr) ;
    }
}
@media (min-width:320px) {
    .slide{
        display: grid;
        grid-template-columns: repeat(2,1fr);
    }
}
@media (min-width:750px) {
    .slide{
        display: grid;
        grid-template-columns: repeat(4,1fr);
    }
}
