<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div p{
            color: red;
        }
        div > p{
            color: aqua;
        }
        h1 + p{
            color: green;
        }
        div ~ p {
            color: bisque;
        }
    </style>
</head>
<body>
    <div>
        <p>Bharath</p>
        <section>
            <p>Raj</p>
            <p>Ram</p>
        </section>
        <p>Austosh</p>
        <p>Ravan</p>
    </div>
    <h1>This is One Operator</h1>
    <h1>hjbjbcs</h1>
    <p>This is next operator</p>
    <p>hwfwfhehjk</p>
    <p>jbdvbsdj</p>
</body>
</html>
